<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="../static/css/style_page_principale.css">
</head>

<body>
    <header>
        <div class="logo"><img src="../static/images/verrie.webp" alt="Logo de la Verrerie"></div>
        <div class="logo"><img src="../static/images/arles-linux_log.webp" alt="Logo d'Arles Linux" height="134px"></div>
    </header>

    <main>
        <img src="../static/images/21470155.webp" alt="Image de fond" class="hero-image">
        <div class="overlay"></div> <!-- Filtre de couleur -->
        <div class="content">
            <h1>La météo à la Verrerie</h1>
            <h2>Un projet éco-responsable</h2>
            <button class="cta-button" onclick="acceder()">
                <span>Accéder →</span>
            </button>
        </div>
    </main>

    <script>
        function acceder() {
            // Modifiez le chemin ci-dessous selon votre structure de dossiers
            // Exemples :
            // './interface2.html' - même dossier
            // '/interface2.html' - racine du site
            // '/ProjetVerrie/interface2.html' - sous-dossier ProjetVerrie
            // '../interface2.html' - dossier parent
            const chemin = '{{url_for("accueil")}}'; // ← MODIFIEZ ICI
            window.location.href = chemin;
        }

        // Animation au scroll du header
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            const currentScroll = window.pageYOffset;
            
            if (currentScroll <= 0) {
                header.style.boxShadow = '0 2px 20px rgba(0, 0, 0, 0.1)';
            }
        });
    </script>
</body>
</html>
