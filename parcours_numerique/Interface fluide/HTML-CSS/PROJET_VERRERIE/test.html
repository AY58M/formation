<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exemple avec aside</title>
  <style>
    body {
      display: flex;
      margin: 0;
      font-family: sans-serif;
    }

    main {
      flex: 3;
      padding: 20px;
      background-color: #f9f9f9;
    }

    aside {
      flex: 1;
      padding: 20px;
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>

  <main>
    <h1>Contenu principal</h1>
    <p>Ceci est le contenu principal de la page. On peut y mettre des articles, du texte, des images, etc.</p>
  </main>

  <aside>
    <h2>Informations complémentaires</h2>
    <p>Ce contenu est placé dans une balise <code>&lt;aside&gt;</code> et apparaît à côté du contenu principal.</p>
  </aside>

</body>
</html>
