<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="conteneur"></div>
    <script>
        function genererUrl (url,text)
        {
            let a = `<p><a href="${url}">${text}</a></p>`;
            return a;
        }
        let conteneur = document.getElementById('conteneur');
        let lien = genererUrl('https://www.franceinfo.fr/', 'France info');
        conteneur.insertAdjacentHTML('afterbegin', lien)
    </script>
</body>
</html>
