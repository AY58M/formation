<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function perimetre(rayon) 
        {
            return 2*3.14*rayon;

        }

        let r = parseFloat(prompt('Entrez le rayon du cercle:'));
        let p = perimetre(r);
        alert(p.toFixed(2));


    </script>
</body>

</html>
