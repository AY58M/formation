<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion des utilisateurs</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">


  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="btn" id="getList">
    <h1>Gestion des utilisateurs</h1>

    <button>Récupérer la liste</button>
  </div>


  <div id="list_users"></div>
  <input id="id_input" type="text">
  <div class="btn" id="test">
    <h2>TEST !</h2>
  </div>

  <div class="btn">
    <h2>Ajouter un utilisateur</h2>
  </div>


  <label for="name">Pseudo :</label>
  <input type="text" id="pseudo_input" name="pseudo" placeholder="Pseudo"><br>
  <label for="name">Mail :</label>
  <input type="email" id="mail_input" name="mail" placeholder="Mail"><br>
  <label for="name">Mot de passe :</label>
  <input type="password" id="password_input" placeholder="Mot de passe"><br>
  <label for="name">Confirmation mot de passe : </label>
  <input type="password" id="password_confirm" placeholder="Confirmation Mot de passe">
  <br><br>

  <button>
    <div>Ajouter</div>
  </button>


  <div id="retour"></div>
  <div id="error"></div>

  <hr>

  <h2>Articles</h2>


  <label for="titre">Titre :</label>
  <input type="text" id="titre" name="titre">

  <label for="date_creation">Date de création :</label>
  <input type="date" id="date_creation" name="date_creation">

  <label for="date_mise_a_jour">Date de mise à jour :</label>
  <input type="date" id="date_mise_a_jour" name="date_mise_a_jour">

  <label for="date_publication">Date de publication :</label>
  <input type="date" id="date_publication" name="date_publication">

  <label for="utilisateur">Utilisateur :</label>
  <input type="text" id="user" name="user">

  <label for="description">Description courte :</label>
  <select id="description" name="description"></select>

  <label for="contenu">Contenu :</label>
  <select id="contenu" name="contenu"></select><br><br>

  <button type="submit">Enregistrer</button>




</body>
<footer>
  <script>
    function ajaxRequest(link) {
      return new Promise(function (resolve, reject) {
        var xmlHttp = new XMLHttpRequest();
        xmlHttp.onreadystatechange = function () {
          if (xmlHttp.readyState === 4) {
            if (xmlHttp.status === 200) {
              var re = JSON.parse(xmlHttp.responseText);
              if (re.status === "success") {
                resolve(re);
              } else {
                reject(re);
              }
            } else {
              reject({ status: "error", code: xmlHttp.status });
            }
          }
        };
        xmlHttp.open("GET", link);
        xmlHttp.send();
      });
    }
    document.getElementById("test").addEventListener("click", () => {
      let id = document.getElementById("id_input").value;
      ajaxRequest("../api/get_user_pseudo.php?id=" + id)
        .then(re => {
          if (re['status'] == 'success') {
            document.getElementById("error").innerHTML = "";
            document.getElementById("retour").innerHTML = re['message'] + " " + re["nom"];
          } else {
            //errors in catch...
          }
        })
        // for some reason, errors go in catch.... 
        .catch(re => {
          document.getElementById("retour").innerHTML = "";
          document.getElementById("error").innerHTML = re['message'];
        });
    });


    document.getElementById("getList").addEventListener("click", () => {
      ajaxRequest("../api/list_users.php")
        .then(re => {
          re['users'].forEach((user) => {
            document.getElementById("list_users").innerHTML += "<div class= 'user'> " + user['user_id'] + "-" + user['email'] + "</div>"

          });


          // get form data and sends it to the php
          document.getElementById("send_form_user").addEventListener("click", () => {
            let pseudo = document.getElementById('pseudo_input').value;
            let email = document.getElementById('mail_input').value;
            let password = document.getElementById('password_input').value;
            let password_confirm = document.getElementById('password_confirm').value;
            ajaxRequest("../api/add_user.php?pseudo=" + pseudo
              + "&email=" + email
              + "&password=" + password
              + "&password_confirm=" + password_confirm
            ).then(re => {
            })
              .catch(re => {
                document.getElementById("retour").innerHTML = "";
                document.getElementById("error").innerHTML = re['message'];
              });
          });


        })
        .catch(re => {
          document.getElementById("retour").innerHTML = "";
          document.getElementById("error").innerHTML = re['message'];
        });
    });
    document.getElementById("retour").addEventListener("click", (e) => {
      let t = e.target
      if (t.classList.contains("kikoo")) {
        e.target.classList.remove("kikoo");
      } else {
        e.target.classList.add("kikoo");
      }

    });
  </script>
</footer>

</html>
