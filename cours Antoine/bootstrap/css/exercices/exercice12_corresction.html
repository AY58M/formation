<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice 12 correction</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <style>
        .row div {
            min-height: 100px;
        }
    </style>

</head>

<body>


    <div class="container-fluid m-0 p-0 vh-100">

        <!-- HEADER -->
        <div class="row">
            <header class="row h-25">
                <div class="col-12 bg-light border border-primary text-center d-flex justify-content-center align-items-center"
                    style="height:150px;">
                    <h2>Entete<br>12 colonnes</h2>
                </div>
            </header>
            <main class="row flex-fill">
                <div class="col-4">
                    <nav class="row"> <!--nav et navbar pour les menus-->
                        <div class="col-12 bg-danger text-white">Menu </div>
                        <div class="col-12 bg-dark text-white">Sous-menu 2</div>
                        <div class="col-12 bg-dark text-white">Sous-menu 3</div>
                        <div class="col-12 bg-dark text-white">Sous-menu 4</div>
                        <div class="col-12 bg-dark text-white">Sous-menu 5</div>
                        <div class="col-12 bg-dark text-white">Sous-menu 6</div>
                    </nav>
                </div>
                <div class="col-8">
                    <div class="row h-100">
                        <div class="col-12 bg-success text-white"></div>
                        <div class="col-12 bg-warning text-white"></div>
                        <div class="col-12 bg-info text-white"></div>
                    </div>
                </div>
            </main>
            <!-- FOOTER -->
            <div class="row flex-fill">
                <div class="col-12 bg-danger p-0 border border-white text-center d-flex justify-content-center align-items-center"
                    style="height:100px;">
                    <h2>Footer<br>12 colonnes</h2>
                </div>
            </div>
        </div>

        <script src="../js/bootstrap.js"></script>
</body>

</html>
