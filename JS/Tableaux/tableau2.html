<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let prenom = [ 'Jean', 'Sophie', 'Jules','Claude', 'Paul'];
        //  Ajouter un élément en fin de tableau
         prenom.push(`Julie`);
        //  Ajouter un élément en début de tableau
         prenom.unshift(`Marcel`);
        //  supprimer un élément en fin de tableau
        prenom.pop();
        //  supprimer un élément en début de tableau
        prenom.shift();


        console.log(prenom);
    </script>
</body>
</html>
