<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Form input</h1>
    <form action="#" method="post">
        <label for="prenom">Prénom :</label>
        <input type="text" name="prenom" id="prenom" placeholder="Votre prenom"><br><br>
        <label for="pass">Mot de passe :</label>
        <input type="password" name="pass" id="pass" placeholder="Votre mot de passe :"><br><br>
        <label for="mail">Votre email :</label>
        <input type="email" name="mail" id="mail" placeholder="Votre email :"><br><br>
        <label for="color">Votre couleur :</label>
        <input type="color" name="color" id="color"><br><br>
        <label for="date">La date :</label>
        <input type="date" name="date" id="date"><br><br>
        <input type="submit" value="Envoyer">
    </form>

</body>

</html>
