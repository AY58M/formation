<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: row; /* par defaut*/
            justify-content: center;
            align-items: center;
            height: 400px;
            border: 1px solid red;
        }

        #element1 {
            background-color: aqua;
            border: 2px solid black;
        }

        #element2 {
            background-color: violet;
            border: 2px solid black;
        }

        #element3 {
            background-color: chartreuse;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="element1">Lorem, ipsum.</div>
        <div id="element2">Lorem ipsum dolor sit.</div>
        <div id="element3">Lorem ipsum dolor sit amet consectetur.</div>

    </div>
</body>

</html>
