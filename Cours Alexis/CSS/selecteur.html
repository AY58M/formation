<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecteur CSS</title>
    <style>
        p {
            font-size: 12px;
        }

        #monid {
            color: red;
        }

        .maclasse {
            color: magenta;
        }

        h2,
        h3,
        h4 {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>Selecteur CSS</h1>
    <p>Lorem ipsum dolor sit amet.</p>
    <p id="monid">Lorem ipsum dolor sit.</p>
    <p class="maclasse">Lorem ipsum dolor sit amet consectetur, adipisicing elit.</p>
    <h2>Titre2</h2>
    <h3>Titre3</h3>
    <h4>Titre4</h4>
</body>

</html>
