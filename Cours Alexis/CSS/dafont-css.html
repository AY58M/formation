<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kablammo&family=Young+Serif&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'dragonball';
            src: url('dragonball.ttf');
        }

        p {
            font-family: 'dragonball', 'sans-serif';
        }

        #monid {
            font-family: "Kablammo", system-ui;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "MORF" 0;


        }
    </style>

</head>

<body>
    <h1>Font CSS</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quibusdam, cumque!</p>
    <p id="monid">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sapiente, cumque?</p>
</body>

</html>
