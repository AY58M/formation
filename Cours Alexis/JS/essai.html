<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let a=1,b=2,c;
        console.log (a);
        console.log(b);
        console.log(c);

        let backQuoteTest = `Nous pouvons écrire du texte sur plusieurs lignes, ce qui est impossible avec les guillemets 'simples' ou "doubles".`;
        console.log(backQuoteTest);

        backQuoteTest = `on peut mettre des guillemets 'simples' ou "doubles" dans une chaîne de caractères entourée de backquotes.`;
        console.log(backQuoteTest);

        let text = "integrer une variable";
        backQuoteTest = `Voici comment ${text} dans une chaîne de caractères.`;
        console.log(backQuoteTest);

        let addition = 2 + 3;
        console.log(addition);

        let division = 18 / 2;
        console.log(division);

        let exponentiel = 3**3;
        console.log(exponentiel);

        // calculer l'aire d'un triangle de base 5 et de hauteur 10
        let base = 5;
        let hauteur = 10;
        let aire = (base * hauteur) / 2;
        console.log(aire);

        // opérateur de concaténation :
        let salutation = "Bonjour";
        let nom = "Alice";
        let message = salutation + " " + nom + "!";
        console.log(message);

        let banalite = " Le ciel est bleu.";
        message += banalite;
        console.log(message);
