<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function hypotenuse(cote1, cote2) {
            return Math.hypot(cote1, cote2);
        }
        let cote1 = Number(prompt('entrez la longueur du premier côté'));
        let cote2 = Number(prompt('entrez la longueur du deuxième côté'));
        let hyp = hypotenuse(cote1, cote2);
        alert('la longueur de l\'hypoténuse est de ' + hyp);
    </script>
</body>
</html>
