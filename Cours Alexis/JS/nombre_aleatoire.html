<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function nombreAleatoire(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        let min = Number(prompt('entrez le nombre minimum'));
        let max = Number(prompt('entrez le nombre maximum'));
        let aleatoire = nombreAleatoire(min, max);
        alert('le nombre aléatoire est de ' + aleatoire);
    </script>
</body>
</html>
