    <script>
        // année, mois, jour, heure, minute, seconde
        let date = new Date(2026, 5, 22, 17, 25, 11);
        let dateLocale = date.toLocaleString('fr-FR', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: 'numeric',
            minute: 'numeric',
            second: 'numeric'
        });
        alert(dateLocale);




    </script>
