<!DOCTYPE html>

<body>
    <script>
        function tripleNombre(nombre) {
            return nombre * 3;
        }
        let nombre = Number(prompt('entrez un nombre'));
        let triple = tripleNombre(nombre);
        alert('le triple du nombre est de ' + triple);
    </script>
</body>
