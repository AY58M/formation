<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function perimetreRectangle(longueur, largeur){
            return 2 * (longueur + largeur);
        }
        let longueur = Number(prompt('entrez la longueur du rectangle'));
        let largeur = Number(prompt('entrez la largeur du rectangle'));
        let perimetre = perimetreRectangle(longueur, largeur);
        alert('le périmètre du rectangle est de ' + perimetre);
    </script>
</body>
</html>
