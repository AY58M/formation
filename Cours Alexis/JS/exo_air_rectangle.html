<body>
    <script>
        function airRectangle(longueur, largeur){
            return longueur * largeur;
        }
        let longueur = Number(prompt('entrez la longueur du rectangle'));
        let largeur = Number(prompt('entrez la largeur du rectangle'));
        let air = airRectangle(longueur, largeur);
        alert('l\'air du rectangle est de ' + air);
    </script>
</body>
