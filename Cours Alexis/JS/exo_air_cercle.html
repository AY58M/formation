<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function airCercle(rayon){
            return Math.PI * rayon * rayon;
        }
        let rayon = Number(prompt('entrez le rayon du cercle'));
        let air = airCercle(rayon);
        alert('l\'air du cercle est de ' + air);
    </script>
</body>
</html>
