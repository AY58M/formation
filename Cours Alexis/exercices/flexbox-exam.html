<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            gap: 30px;
            height: 600px;
            align-items: center;

        }

        #un {
            background-color: aqua;
            border: 2px solid black;
        }

        #deux {
            background-color: aquamarine;
            border: 2px solid violet;
        }

        #trois {
            background-color: blueviolet;
            border: 2px solid yellow;
        }

        #quatre {
            background-color: brown;
            border: 2px solid yellowgreen;
        }
    </style>
</head>

<body>
    <h1>Flexbox</h1>
    <div class="container">
        <p id="un">Lorem, ipsum.</p>
        <p id="deux">Lorem ipsum dolor sit.</p>
        <p id="trois">Lorem ipsum dolor sit amet consectetur.</p>
        <p id="quatre">Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur, temporibus!</p>
    </div>
</body>

</html>
